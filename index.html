<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VGHTPE-HR Markdown & Mermaid 即時編輯器</title>
    <!-- 引入 Tailwind CSS 與 Typography 插件來美化 Markdown 排版 -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- 設定 Tailwind 啟用 Class 基礎的深色模式 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- 引入 Marked.js 用於解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 自訂一些基本樣式 -->
    <style>
        /* 自訂滾動條樣式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* 深色模式滾動條 */
        .dark ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569; 
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        /* 觸控裝置優化：取消 Hover 依賴，永遠顯示工具列 */
        @media (hover: none) and (pointer: coarse) {
            .group-hover\:opacity-100 {
                opacity: 1 !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 h-screen flex flex-col font-sans text-slate-800 dark:text-slate-200 overflow-hidden transition-colors duration-200">

    <!-- 頂部導覽列 -->
    <header class="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex justify-between items-center z-10 transition-colors duration-200">
        <div class="flex items-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-indigo-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            <h1 class="text-xl font-bold text-slate-800 dark:text-slate-100 transition-colors duration-200">VGHTPE-HR 圖表編輯器 by Leno Tsai</h1>
            
            <!-- 白天/黑夜模式切換按鈕 -->
            <button id="themeToggleBtn" class="ml-2 p-2.5 rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 transition-colors shadow-sm" title="切換深色/淺色模式">
                <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-sm text-slate-500 dark:text-slate-400 hidden sm:block transition-colors duration-200">
                支援標準 Markdown 與 Mermaid 圖表語法
            </div>
        </div>
    </header>

    <!-- 主要工作區 -->
    <main id="main-container" class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <!-- 左側：編輯器區塊 -->
        <section id="editor-pane" class="w-full md:w-1/2 flex flex-col bg-white dark:bg-slate-800 flex-shrink-0 transition-colors duration-200">
            <div class="bg-slate-100 dark:bg-slate-800 px-4 py-2 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center text-sm font-semibold text-slate-600 dark:text-slate-300 transition-colors duration-200">
                <div class="flex items-center gap-2">
                    <span>📝 Markdown 編輯區</span>
                    <span id="save-status" class="text-xs text-emerald-600 font-normal opacity-0 transition-opacity duration-300">已自動儲存</span>
                </div>
                <button id="clearBtn" class="text-slate-400 hover:text-red-500 transition-colors" title="清空內容">
                    清除
                </button>
            </div>
            <textarea id="editor" class="flex-1 w-full p-6 resize-none outline-none focus:ring-inset focus:ring-2 focus:ring-indigo-500 font-mono text-sm leading-relaxed bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-300 transition-colors duration-200" spellcheck="false"></textarea>
        </section>

        <!-- 拖曳分隔線 (僅在電腦版顯示) -->
        <div id="resizer" class="hidden md:flex w-2 bg-slate-200 dark:bg-slate-700 hover:bg-indigo-300 dark:hover:bg-indigo-500 cursor-col-resize items-center justify-center transition-colors flex-shrink-0 z-20 group touch-none" title="左右拖曳調整比例">
            <div class="w-1 h-8 bg-slate-400 dark:bg-slate-500 rounded-full group-hover:bg-indigo-500 transition-colors"></div>
        </div>

        <!-- 右側：預覽區塊 -->
        <section id="preview-pane" class="w-full md:flex-1 flex flex-col bg-slate-50 dark:bg-slate-900 overflow-hidden transition-colors duration-200">
            <div class="bg-slate-100 dark:bg-slate-800 px-4 py-2 border-b border-slate-200 dark:border-slate-700 text-sm font-semibold text-slate-600 dark:text-slate-300 transition-colors duration-200">
                <span>👁️ 即時預覽</span>
            </div>
            <div class="flex-1 overflow-y-auto p-6 md:p-8">
                <div id="preview" class="prose prose-slate dark:prose-invert prose-indigo max-w-none transition-colors duration-200">
                    <!-- 渲染結果將顯示於此 -->
                </div>
            </div>
        </section>

    </main>

    <!-- 載入 Mermaid -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        
        // 取得 DOM 元素
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const clearBtn = document.getElementById('clearBtn');
        const resizer = document.getElementById('resizer');
        const editorPane = document.getElementById('editor-pane');
        const mainContainer = document.getElementById('main-container');
        const saveStatus = document.getElementById('save-status');

        const STORAGE_KEY = 'vghtpe_mermaid_editor_content';

        // --- 白天與黑夜模式邏輯 ---
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        
        let isDarkMode = localStorage.getItem('theme') === 'dark' || 
            (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);

        function updateTheme(initial = false) {
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
            
            mermaid.initialize({ 
                startOnLoad: false, 
                theme: isDarkMode ? 'dark' : 'default',
                securityLevel: 'loose',
                fontFamily: 'inherit'
            });

            if (!initial) {
                renderContent();
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            updateTheme();
        });

        updateTheme(true);

        // --- 拖曳調整畫面比例 ---
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        resizer.addEventListener('touchstart', (e) => {
            isResizing = true;
            document.body.style.userSelect = 'none';
        }, { passive: false });

        function handleMove(e) {
            if (!isResizing) return;
            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const containerRect = mainContainer.getBoundingClientRect();
            let newWidthPercent = ((clientX - containerRect.left) / containerRect.width) * 100;
            if (newWidthPercent < 20) newWidthPercent = 20;
            if (newWidthPercent > 80) newWidthPercent = 80;
            editorPane.style.width = `${newWidthPercent}%`;
        }

        function stopResize() {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        }

        document.addEventListener('mousemove', handleMove);
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('mouseup', stopResize);
        document.addEventListener('touchend', stopResize);

        // --- 預設內容 ---
        const defaultContent = `# 歡迎使用 VGHTPE-HR Markdown & Mermaid 工具 🚀
**by Leno Tsai**

這是一個即時編輯器，可以將您的 Markdown 內容與 Mermaid 圖表程式碼轉換為視覺化的畫面。

## 流程圖範例 (Flowchart)
\`\`\`mermaid
graph TD
    A[人事室] -->|處理加班費| B(差勤系統)
    B --> C{人工列印憑證}
    C -->|孝孝| D[進系統手動申報]
    C -->|佳佳| E[手動查核、電話訪談]
    C -->|勤勤| F[手動查核]
\`\`\`

## 循序圖範例 (Sequence Diagram)
\`\`\`mermaid
sequenceDiagram
    participant 貴貴
    participant 慧慧
    貴貴 ->>+ 慧慧: Hello 慧慧, how are you?
    慧慧 -->>- 貴貴: I feel great!
\`\`\``;

        // --- 渲染與自動存檔 ---
        async function renderContent() {
            const markdownText = editor.value.replace(/\u00A0/g, ' ');
            preview.innerHTML = marked.parse(markdownText);

            const mermaidCodeBlocks = preview.querySelectorAll('code.language-mermaid');
            
            mermaidCodeBlocks.forEach(block => {
                const preElement = block.parentElement; 
                const mermaidContainer = document.createElement('div');
                mermaidContainer.className = 'group relative my-6 rounded-lg border border-transparent hover:border-slate-200 dark:hover:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors pt-10 pb-4 px-4';
                
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid overflow-x-auto flex justify-center w-full';
                mermaidDiv.textContent = block.textContent; 
                
                mermaidContainer.appendChild(mermaidDiv);
                preElement.replaceWith(mermaidContainer);
            });

            try {
                const nodesToRender = document.querySelectorAll('.mermaid');
                if (nodesToRender.length > 0) {
                    await mermaid.run({ nodes: nodesToRender });
                    
                    document.querySelectorAll('.group.relative').forEach((container, index) => {
                        const svg = container.querySelector('svg');
                        if (!svg) return;

                        const initialWidth = svg.getBoundingClientRect().width || 500;
                        let currentWidth = initialWidth;
                        
                        svg.style.maxWidth = 'none';
                        svg.style.width = `${currentWidth}px`;
                        svg.style.height = 'auto';
                        svg.style.transition = 'width 0.2s ease';

                        const toolbar = document.createElement('div');
                        toolbar.className = 'absolute top-2 right-2 flex gap-1 bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 rounded-md p-1 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-10';
                        const btnClass = 'p-2.5 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition-colors';

                        const zoomInBtn = document.createElement('button');
                        zoomInBtn.className = btnClass;
                        zoomInBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>';
                        zoomInBtn.onclick = () => { currentWidth *= 1.25; svg.style.width = `${currentWidth}px`; };

                        const zoomOutBtn = document.createElement('button');
                        zoomOutBtn.className = btnClass;
                        zoomOutBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>';
                        zoomOutBtn.onclick = () => { currentWidth /= 1.25; svg.style.width = `${currentWidth}px`; };

                        const downloadBtn = document.createElement('button');
                        downloadBtn.className = btnClass;
                        downloadBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>';
                        downloadBtn.onclick = () => {
                            const cloneSvg = svg.cloneNode(true);
                            cloneSvg.style.width = '100%';
                            cloneSvg.style.height = '100%';
                            const svgData = new XMLSerializer().serializeToString(cloneSvg);
                            const preface = '<?xml version="1.0" standalone="no"?>\r\n';
                            const blob = new Blob([preface, svgData], { type: 'image/svg+xml;charset=utf-8' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `mermaid-chart-${index + 1}.svg`;
                            a.click();
                            URL.revokeObjectURL(url);
                        };

                        toolbar.appendChild(zoomInBtn);
                        toolbar.appendChild(zoomOutBtn);
                        toolbar.appendChild(downloadBtn);
                        container.appendChild(toolbar);
                    });
                }
            } catch (error) {
                console.error("Mermaid 渲染失敗:", error);
            }
        }

        // 防抖動 (Debounce) 機制 + 自動存檔
        let renderTimeout;
        let saveStatusTimeout;
        editor.addEventListener('input', () => {
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(() => {
                renderContent();
                // 儲存至 localStorage
                localStorage.setItem(STORAGE_KEY, editor.value);
                // 顯示存檔狀態
                saveStatus.classList.remove('opacity-0');
                clearTimeout(saveStatusTimeout);
                saveStatusTimeout = setTimeout(() => {
                    saveStatus.classList.add('opacity-0');
                }, 2000);
            }, 300);
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('確定要清空所有內容嗎？')) {
                editor.value = '';
                localStorage.removeItem(STORAGE_KEY);
                renderContent();
                editor.focus();
            }
        });

        // 初始啟動：讀取暫存或預設值
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData !== null) {
            editor.value = savedData;
        } else {
            editor.value = defaultContent;
        }
        renderContent();
    </script>
</body>
</html>
