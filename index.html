    <!-- 載入 Mermaid (更新至最新 v11，以支援 Kanban, Architecture, Packet 等最新圖表) -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        
        // 取得 DOM 元素
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const clearBtn = document.getElementById('clearBtn');
        const resizer = document.getElementById('resizer');
        const editorPane = document.getElementById('editor-pane');
        const mainContainer = document.getElementById('main-container');

        // --- 白天與黑夜模式邏輯 ---
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');
        
        // 檢查本地儲存的偏好，或是系統偏好
        let isDarkMode = localStorage.getItem('theme') === 'dark' || 
            (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches);

        // 更新主題與 Mermaid 狀態
        function updateTheme(initial = false) {
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
            
            // 設定 Mermaid 主題
            mermaid.initialize({ 
                startOnLoad: false, 
                theme: isDarkMode ? 'dark' : 'default',
                securityLevel: 'loose',
                fontFamily: 'inherit'
            });

            // 若非初始載入，則觸發重新渲染以套用新圖表顏色
            if (!initial && typeof renderContent === 'function') {
                renderContent();
            }
        }

        // 綁定切換按鈕事件
        themeToggleBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
            updateTheme();
        });

        // 初始設定主題
        updateTheme(true);

        // --- 拖曳調整畫面比例功能 ---
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none'; // 避免拖曳時選取到文字
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            
            // 取得主容器的寬度與位置
            const containerRect = mainContainer.getBoundingClientRect();
            // 計算滑鼠相對位置的百分比
            let newWidthPercent = ((e.clientX - containerRect.left) / containerRect.width) * 100;
            
            // 限制左右兩側最小寬度為 20% 與最大寬度為 80%
            if (newWidthPercent < 20) newWidthPercent = 20;
            if (newWidthPercent > 80) newWidthPercent = 80;
            
            // 設定左側寬度，右側透過 flex-1 自動填滿剩餘空間
            editorPane.style.width = `${newWidthPercent}%`;
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });
        // ---------------------------

        // 預設的 Markdown 與 Mermaid 範例內容 (移除需要外部套件的 ZenUML，共 20 種)
        const defaultContent = `# 歡迎使用 Markdown & Mermaid 工具 🚀

這是一個即時編輯器，可以將您的 Markdown 內容與 Mermaid 圖表程式碼轉換為視覺化的畫面。

        // 將預設內容填入編輯器
        editor.value = defaultContent;

        // 負責將 Markdown 轉為 HTML 並渲染 Mermaid 圖表的函數
        async function renderContent() {
            const markdownText = editor.value;
            
            // 1. 使用 Marked.js 將 Markdown 轉換為 HTML
            preview.innerHTML = marked.parse(markdownText);

            // 2. 找出所有被標記為 language-mermaid 的 code 區塊
            const mermaidCodeBlocks = preview.querySelectorAll('code.language-mermaid');
            
            // 3. 將這些 code 區塊轉換為帶有外框與工具列空間的容器
            mermaidCodeBlocks.forEach(block => {
                // 取得外層的 <pre> 標籤
                const preElement = block.parentElement; 
                
                // 建立一個外層容器，用來放置圖表與工具列
                const mermaidContainer = document.createElement('div');
                // 使用 Tailwind 設定外框、hover 效果、相對定位 (給懸浮工具列使用)
                mermaidContainer.className = 'group relative my-6 rounded-lg border border-transparent hover:border-slate-200 dark:hover:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors pt-10 pb-4 px-4';
                
                // 建立新的 div 元素來讓 Mermaid 處理
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid overflow-x-auto flex justify-center w-full';
                mermaidDiv.textContent = block.textContent; 
                
                mermaidContainer.appendChild(mermaidDiv);
                
                // 將 <pre> 替換為我們的新結構
                preElement.replaceWith(mermaidContainer);
            });

            // 4. 呼叫 Mermaid 進行渲染
            try {
                // 找出所有 class 為 mermaid 的節點並進行渲染
                const nodesToRender = document.querySelectorAll('.mermaid');
                if (nodesToRender.length > 0) {
                    await mermaid.run({ nodes: nodesToRender });
                    
                    // 5. 渲染完成後，為每個圖表加入放大、縮小、下載工具列
                    document.querySelectorAll('.group.relative').forEach((container, index) => {
                        const svg = container.querySelector('svg');
                        if (!svg) return;

                        // 取得 SVG 初始渲染的寬度，做為後續縮放基準
                        const initialWidth = svg.getBoundingClientRect().width || 500;
                        let currentWidth = initialWidth;
                        
                        // 移除 Mermaid 預設的最大寬度，改用明確寬度以利自訂縮放
                        svg.style.maxWidth = 'none';
                        svg.style.width = `${currentWidth}px`;
                        svg.style.height = 'auto'; // 保持長寬比例
                        svg.style.transition = 'width 0.2s ease';

                        // 🖱️ 加入滑鼠滾輪縮放功能
                        svg.addEventListener('wheel', (e) => {
                            e.preventDefault(); // 防止網頁跟著上下捲動
                            
                            // e.deltaY < 0 表示滾輪向上滾（放大），反之則縮小
                            // 這裡設定每次滾動縮放比例為 10% (1.1)
                            if (e.deltaY < 0) {
                                currentWidth *= 1.1; 
                            } else {
                                currentWidth /= 1.1;
                            }
                            
                            svg.style.width = `${currentWidth}px`;
                        }, { passive: false }); // passive: false 允許呼叫 preventDefault()

                        // 建立懸浮工具列
                        const toolbar = document.createElement('div');
                        toolbar.className = 'absolute top-2 right-2 flex gap-1 bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 rounded-md p-1 opacity-0 group-hover:opacity-100 transition-opacity duration-200 z-10';
                        
                        // 工具列按鈕的共用樣式
                        const btnClass = 'p-1.5 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-slate-100 dark:hover:bg-slate-700 rounded transition-colors';

                        // 🔍 放大按鈕
                        const zoomInBtn = document.createElement('button');
                        zoomInBtn.className = btnClass;
                        zoomInBtn.title = '放大';
                        zoomInBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>';
                        zoomInBtn.onclick = () => {
                            currentWidth *= 1.25; // 每次放大 25%
                            svg.style.width = `${currentWidth}px`;
                        };

                        // 🔍 縮小按鈕
                        const zoomOutBtn = document.createElement('button');
                        zoomOutBtn.className = btnClass;
                        zoomOutBtn.title = '縮小';
                        zoomOutBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>';
                        zoomOutBtn.onclick = () => {
                            currentWidth /= 1.25; // 每次縮小約 20%
                            svg.style.width = `${currentWidth}px`;
                        };

                        // 💾 下載 SVG 按鈕
                        const downloadBtn = document.createElement('button');
                        downloadBtn.className = btnClass;
                        downloadBtn.title = '下載 SVG';
                        downloadBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>';
                        downloadBtn.onclick = () => {
                            // 複製一份 SVG 準備輸出
                            const cloneSvg = svg.cloneNode(true);
                            // 重設寬高為 100%，確保下載的 SVG 圖片具有彈性響應式大小
                            cloneSvg.style.width = '100%';
                            cloneSvg.style.height = '100%';
                            
                            // 將 SVG 轉換為文字格式
                            const svgData = new XMLSerializer().serializeToString(cloneSvg);
                            const preface = '<?xml version="1.0" standalone="no"?>\r\n';
                            const blob = new Blob([preface, svgData], { type: 'image/svg+xml;charset=utf-8' });
                            const url = URL.createObjectURL(blob);
                            
                            // 動態建立超連結以觸發下載
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `mermaid-chart-${index + 1}.svg`;
                            document.body.appendChild(a);
                            a.click();
                            
                            // 清理資源
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                        };

                        // 將按鈕加入工具列
                        toolbar.appendChild(zoomInBtn);
                        toolbar.appendChild(zoomOutBtn);
                        toolbar.appendChild(downloadBtn);
                        
                        // 將工具列加入圖表容器
                        container.appendChild(toolbar);
                    });
                }
            } catch (error) {
                // Mermaid 在遇到語法錯誤時會自動在畫面上顯示錯誤訊息，
                // 這裡捕獲錯誤是為了避免中斷後續的 JavaScript 執行。
                console.error("Mermaid 渲染失敗:", error);
            }
        }

        // 防抖動 (Debounce) 機制：避免使用者每打一個字就渲染一次，造成效能問題
        let renderTimeout;
        editor.addEventListener('input', () => {
            clearTimeout(renderTimeout);
            // 停止輸入後 300 毫秒才執行渲染
            renderTimeout = setTimeout(renderContent, 300);
        });

        // 清除按鈕功能
        clearBtn.addEventListener('click', () => {
            if (confirm('確定要清空所有內容嗎？')) {
                editor.value = '';
                renderContent();
                editor.focus();
            }
        });

        // 初始載入時先渲染一次
        renderContent();
    </script>
</body>
</html>
